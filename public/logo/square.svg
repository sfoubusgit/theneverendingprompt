<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- hp=34, crossings at x=14,48,82,116,150,184 — nodes at 48·82·116·150 -->
    <clipPath id="q1"><rect x="14"  y="0" width="34" height="200"/></clipPath>
    <clipPath id="q2"><rect x="48"  y="0" width="34" height="200"/></clipPath>
    <clipPath id="q3"><rect x="82"  y="0" width="34" height="200"/></clipPath>
    <clipPath id="q4"><rect x="116" y="0" width="34" height="200"/></clipPath>
    <clipPath id="q5"><rect x="150" y="0" width="34" height="200"/></clipPath>

    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <radialGradient id="ambient" cx="50%" cy="42%" r="48%" gradientUnits="objectBoundingBox">
      <stop offset="0%"  stop-color="#0d1f2e"/>
      <stop offset="100%" stop-color="#080c18"/>
    </radialGradient>
  </defs>

  <rect width="200" height="200" fill="#080c18"/>
  <rect width="200" height="200" fill="url(#ambient)"/>

  <!-- Helix: cy=84, amp=28 — strands run x=14..184 -->
  <!-- A (cyan, down first) · B (pink, up first) -->

  <!-- Zone 1: B front -->
  <path clip-path="url(#q1)"
    d="M14,84 C23,112 39,112 48,84 C57,56 73,56 82,84 C91,112 107,112 116,84 C125,56 141,56 150,84 C159,112 175,112 184,84"
    fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.18"/>
  <path clip-path="url(#q1)"
    d="M14,84 C23,56 39,56 48,84 C57,112 73,112 82,84 C91,56 107,56 116,84 C125,112 141,112 150,84 C159,56 175,56 184,84"
    fill="none" stroke="#ff2d87" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Zone 2: A front -->
  <path clip-path="url(#q2)"
    d="M14,84 C23,56 39,56 48,84 C57,112 73,112 82,84 C91,56 107,56 116,84 C125,112 141,112 150,84 C159,56 175,56 184,84"
    fill="none" stroke="#ff2d87" stroke-width="2.5" opacity="0.18"/>
  <path clip-path="url(#q2)"
    d="M14,84 C23,112 39,112 48,84 C57,56 73,56 82,84 C91,112 107,112 116,84 C125,56 141,56 150,84 C159,112 175,112 184,84"
    fill="none" stroke="#00e5ff" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Zone 3: B front -->
  <path clip-path="url(#q3)"
    d="M14,84 C23,112 39,112 48,84 C57,56 73,56 82,84 C91,112 107,112 116,84 C125,56 141,56 150,84 C159,112 175,112 184,84"
    fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.18"/>
  <path clip-path="url(#q3)"
    d="M14,84 C23,56 39,56 48,84 C57,112 73,112 82,84 C91,56 107,56 116,84 C125,112 141,112 150,84 C159,56 175,56 184,84"
    fill="none" stroke="#ff2d87" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Zone 4: A front -->
  <path clip-path="url(#q4)"
    d="M14,84 C23,56 39,56 48,84 C57,112 73,112 82,84 C91,56 107,56 116,84 C125,112 141,112 150,84 C159,56 175,56 184,84"
    fill="none" stroke="#ff2d87" stroke-width="2.5" opacity="0.18"/>
  <path clip-path="url(#q4)"
    d="M14,84 C23,112 39,112 48,84 C57,56 73,56 82,84 C91,112 107,112 116,84 C125,56 141,56 150,84 C159,112 175,112 184,84"
    fill="none" stroke="#00e5ff" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Zone 5: B front -->
  <path clip-path="url(#q5)"
    d="M14,84 C23,112 39,112 48,84 C57,56 73,56 82,84 C91,112 107,112 116,84 C125,56 141,56 150,84 C159,112 175,112 184,84"
    fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.18"/>
  <path clip-path="url(#q5)"
    d="M14,84 C23,56 39,56 48,84 C57,112 73,112 82,84 C91,56 107,56 116,84 C125,112 141,112 150,84 C159,56 175,56 184,84"
    fill="none" stroke="#ff2d87" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Crossing nodes — alternating cyan / pink ring -->
  <circle cx="48"  cy="84" r="13" fill="#080c18" stroke="#00e5ff" stroke-width="0.9"/>
  <text x="48"  y="88.5" font-family="monospace" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">T</text>

  <circle cx="82"  cy="84" r="13" fill="#080c18" stroke="#ff2d87" stroke-width="0.9"/>
  <text x="82"  y="88.5" font-family="monospace" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">N</text>

  <circle cx="116" cy="84" r="13" fill="#080c18" stroke="#00e5ff" stroke-width="0.9"/>
  <text x="116" y="88.5" font-family="monospace" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">E</text>

  <circle cx="150" cy="84" r="13" fill="#080c18" stroke="#ff2d87" stroke-width="0.9"/>
  <text x="150" y="88.5" font-family="monospace" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">P</text>

  <!-- Prompt cursor at end of helix, subtle -->
  <text x="168" y="89" font-family="monospace" font-size="13" fill="#ff2d87" opacity="0.55">›_</text>

  <!-- .XYZ centered below mark -->
  <text x="100" y="134" font-family="monospace" font-size="18" fill="#ff2d87" text-anchor="middle" letter-spacing="1">.XYZ</text>

  <!-- Tagline -->
  <text x="100" y="156" font-family="monospace" font-size="7.5" fill="#ffffff3a" text-anchor="middle" letter-spacing="2.5">THE NEVER ENDING PROMPT</text>

  <!-- Slogan -->
  <text x="100" y="169" font-family="monospace" font-size="7" fill="#ffffff18" text-anchor="middle" letter-spacing="2">THE PROMPT NEVER DIES.</text>
</svg>
